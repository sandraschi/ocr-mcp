version: "3.8"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "10859:10859"
    environment:
      - OCR_MODULES=got_ocr,tesseract
      - RELOAD=true
      - WEBAPP_PORT=10859
    volumes:
      - ./backend:/app/backend
      - d:/ocr/models:/app/models
    restart: unless-stopped
    networks:
      - ocr-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./web_sota
      target: dev
    ports:
      - "10858:10858"
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=http://localhost:10859
    volumes:
      - ./web_sota:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ocr-network

networks:
  ocr-network:
    driver: bridge
