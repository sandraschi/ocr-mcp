name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        run: pip install uv

      - name: Install Python deps
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check src/ backend/ scripts/ tests/

      - name: Ruff format check
        run: uv run ruff format src/ backend/ scripts/ tests/ --check

      - name: Run tests
        run: uv run pytest -q

      - name: Install frontend deps
        working-directory: web_sota
        run: npm ci

      - name: TypeScript check
        working-directory: web_sota
        run: npx tsc --noEmit

      - name: Vite build
        working-directory: web_sota
        run: npx vite build
